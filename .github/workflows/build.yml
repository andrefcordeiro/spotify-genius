name: Build Binaries

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pyinstaller
      - run: pip install .

      - run: pyinstaller --onefile -n spotify-genius src/spotify_genius/main.py

      - uses: actions/upload-artifact@v4
        with:
          name: spotify-genius-${{ runner.os }}
          path: dist/*
